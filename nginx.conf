server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Disable absolute redirects to prevent Nginx from redirecting to internal IP/port
    absolute_redirect off;

    # Support clean URLs and fallback routing
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Cache static assets (images, logos, favicons, etc.) for 30 days to improve PageSpeed score
    location ~* \.(?:ico|gif|jpe?g|png|svg|webp|woff2?|eot|otf|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, must-revalidate";
        try_files $uri =404;
    }

    # Custom 404 handler
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
