server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Support clean URLs and fallback routing
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Custom 404 handler
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
